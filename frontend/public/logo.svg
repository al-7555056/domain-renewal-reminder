<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Globe/World Icon -->
  <circle cx="256" cy="256" r="140" stroke="url(#iconGradient)" stroke-width="20" fill="none"/>
  
  <!-- Horizontal lines (latitude) -->
  <path d="M 116 256 Q 256 220 396 256" stroke="url(#iconGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 116 256 Q 256 292 396 256" stroke="url(#iconGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Vertical line (longitude) -->
  <ellipse cx="256" cy="256" rx="50" ry="140" stroke="url(#iconGradient)" stroke-width="12" fill="none"/>
  
  <!-- Freedom Wing (representing "爱自由") -->
  <path d="M 340 180 Q 380 160 420 180 Q 400 200 380 210 Q 360 220 340 210 Z" fill="url(#iconGradient)" opacity="0.9"/>
  <path d="M 340 190 Q 370 175 395 185" stroke="url(#iconGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Clock/Timer Icon (representing renewal reminder) -->
  <circle cx="360" cy="340" r="45" fill="#ffffff" opacity="0.95"/>
  <circle cx="360" cy="340" r="40" stroke="url(#bgGradient)" stroke-width="6" fill="none"/>
  <path d="M 360 310 L 360 340 L 380 350" stroke="url(#bgGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small decorative dots -->
  <circle cx="180" cy="160" r="8" fill="#ffffff" opacity="0.6"/>
  <circle cx="150" cy="350" r="6" fill="#ffffff" opacity="0.5"/>
  <circle cx="380" cy="420" r="7" fill="#ffffff" opacity="0.6"/>
</svg>
